<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO 205 Interactive Study Guide</title>
    <style>
        body {
            background-color: #2e3440;
            color: #d8dee9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
        }
        .sidebar {
            width: 200px;
            background-color: #3b4252;
            padding: 10px;
            border-radius: 8px;
        }
        .section-card {
            background: linear-gradient(135deg, #4c566a, #3b4252);
            border: 1px solid #434c5e;
            border-radius: 8px;
            margin: 5px 0;
            padding: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .section-card:hover {
            background-color: #5e81ac;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
        .toggle-block {
            margin: 10px 0;
        }
        .flashcards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .flashcard {
            background: #4c566a;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            perspective: 1000px;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .progress-container {
            background: #3b4252;
            border-radius: 8px;
            height: 20px;
            margin: 10px 0;
        }
        .progress-bar {
            background: #5e81ac;
            height: 100%;
            border-radius: 8px;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Sections</h2>
            <div class="section-card" onclick="showSection('learning-objectives')">Learning Objectives</div>
            <div class="section-card" onclick="showSection('high-yield')">High Yield Concepts</div>
            <div class="section-card" onclick="showSection('common-mix-ups')">Common Mix Ups</div>
            <div class="section-card" onclick="showSection('check-yourself')">Check Yourself Prompts</div>
        </div>
        <div class="content">
            <div id="learning-objectives" class="toggle-block" style="display: none;">
                <h3>Learning Objectives</h3>
                <p>...</p>
            </div>
            <div id="high-yield" class="toggle-block" style="display: none;">
                <h3>High Yield Concepts</h3>
                <p>...</p>
            </div>
            <div id="common-mix-ups" class="toggle-block" style="display: none;">
                <h3>Common Mix Ups</h3>
                <p>...</p>
            </div>
            <div id="check-yourself" class="toggle-block" style="display: none;">
                <h3>Check Yourself Prompts</h3>
                <p>...</p>
            </div>
            <h2>Flashcards</h2>
            <div class="flashcards">
                <div class="flashcard" onclick="flipCard(this)">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">Front 1</div>
                        <div class="flashcard-back">Back 1</div>
                    </div>
                </div>
                <div class="flashcard" onclick="flipCard(this)">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">Front 2</div>
                        <div class="flashcard-back">Back 2</div>
                    </div>
                </div>
                <!-- More flashcards can be added here -->
            </div>
            <h2>Readiness Tracker</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" style="width: 50%;"></div>
            </div>
            <button onclick="toggleChecklist()">Toggle Checklist</button>
            <div id="checklist" style="display: none;">
                <input type="checkbox" id="item1"> Checklist Item 1<br>
                <input type="checkbox" id="item2"> Checklist Item 2<br>
                <!-- More checklist items can be added here -->
            </div>
        </div>
    </div>
    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.toggle-block');
            sections.forEach(section => {
                section.style.display = section.id === sectionId ? 'block' : 'none';
            });
        }
        function flipCard(card) {
            card.querySelector('.flashcard-inner').style.transform = card.querySelector('.flashcard-inner').style.transform === 'rotateY(0deg)' ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }
        function toggleChecklist() {
            const checklist = document.getElementById('checklist');
            checklist.style.display = checklist.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
