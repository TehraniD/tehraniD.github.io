<script>
const categories = [
  "Micro Legends",
  "Shape Shift",
  "Purple Rain",
  "Uninvited Guests",
  "Petri Dish Drama",
  "Pro vs. Eu"
];

const clues = {
  "Micro Legends": [
    {
      value: 100,
      clue: "This scientist proved that microbes don't just appear out of thin air by using a flask with a very long, curvy neck—like a swan doing yoga.",
      answer: "Who is Louis Pasteur?"
    },
    {
      value: 200,
      clue: "Before this person came along, surgeons basically operated with the hygiene standards of a hot dog vendor. He pioneered antiseptic technique in surgery.",
      answer: "Who is Joseph Lister?"
    },
    {
      value: 300,
      clue: "This scientist figured out that yeast is the life of the party—literally causing fermentation. He also shares a name with a process that keeps your milk from going rogue.",
      answer: "Who is Louis Pasteur?"
    },
    {
      value: 400,
      clue: "Need to prove a specific microbe causes a specific disease? Follow this scientist's famous 4-step set of rules—his 'postulates' are basically the detective handbook of microbiology.",
      answer: "Who is Robert Koch?"
    },
    {
      value: 500,
      clue: "Compound, electron, and confocal are all types of these instruments that let you spy on bacteria. All of them can be used to examine bacterial cells.",
      answer: "What are microscopes?"
    }
  ],
  "Shape Shift": [
    {
      value: 100,
      clue: "If a bacterium looks like a tiny hot dog or a Tic Tac under the microscope, a microbiologist would call its shape this.",
      answer: "What is bacillus (rod-shaped)?"
    },
    {
      value: 200,
      clue: "The prefix 'strepto-' in a bacterial name doesn't describe its shape or size—it actually tells you about this characteristic, like beads on a necklace.",
      answer: "What is arrangement (chain formation)?"
    },
    {
      value: 300,
      clue: "Staphylococcus bacteria form messy, grape-like clusters of spherical cells. This makes their arrangement look like a bunch of tiny balls that failed at being organized.",
      answer: "What are irregular clusters of spherical cells?"
    },
    {
      value: 400,
      clue: "The golden child of hospital infections, this bacterium's species name 'aureus' literally means this color in Latin—and yes, its colonies actually look that way.",
      answer: "What is yellow (golden)?"
    },
    {
      value: 500,
      clue: "Most bacteria skip the romance and reproduce by simply splitting themselves in half through this process. It's efficient, if a bit lonely.",
      answer: "What is binary fission?"
    }
  ],
  "Purple Rain": [
    {
      value: 100,
      clue: "After a Gram stain, these bacteria show up purple. The reagent responsible for this regal color is crystal violet—because they're worth it.",
      answer: "What are Gram-positive bacteria?"
    },
    {
      value: 200,
      clue: "In the Gram stain procedure, iodine isn't the primary stain or the counterstain—it plays this supporting role, locking crystal violet into the cell wall like a bouncer at a nightclub.",
      answer: "What is a mordant?"
    },
    {
      value: 300,
      clue: "Put these Gram stain steps in order and you get: Crystal violet first, then iodine, then alcohol-acetone, then safranin. As a numbered sequence (given 1=alcohol-acetone, 2=crystal violet, 3=safranin, 4=iodine), the correct order is this.",
      answer: "What is 2-4-1-3?"
    },
    {
      value: 400,
      clue: "Lipopolysaccharide (LPS) is a nasty endotoxin found exclusively in the outer membrane of this type of bacterial cell wall. These bacteria stain pink, not purple.",
      answer: "What is the Gram-negative cell wall?"
    },
    {
      value: 500,
      clue: "This compound is the major structural component of bacterial cell walls—both Gram-positive and Gram-negative have it, though the positive ones have way more. It's basically bacterial armor made of sugar and amino acids.",
      answer: "What is peptidoglycan?"
    }
  ],
  "Uninvited Guests": [
    {
      value: 100,
      clue: "Mad Cow Disease, Scrapie, CJD, and Kuru walk into a bar. The bartender says, 'We don't serve your kind—you're not even alive!' These infectious agents are just misfolded proteins called this.",
      answer: "What are prions?"
    },
    {
      value: 200,
      clue: "Hepatitis A, B, C, and Herpes simplex are all examples of diseases caused by this type of microbe—the ultimate freeloader that can't even reproduce without hijacking your cells.",
      answer: "What are viruses?"
    },
    {
      value: 300,
      clue: "Athlete's foot and ringworm are caused by dermatophyte infections. Despite the name 'ringworm,' the actual culprit is this type of organism—no worms involved!",
      answer: "What are fungi?"
    },
    {
      value: 400,
      clue: "Eating undercooked beef or pork might introduce you to this unwelcome flatworm passenger. It's the parasitic helminth that hitches a ride in contaminated meat.",
      answer: "What is a tapeworm?"
    },
    {
      value: 500,
      clue: "When a virus decides to take a nap inside your cells and can wake up later to cause trouble again (like herpes), this dormant, asymptomatic state of viral infection is called this.",
      answer: "What is latency?"
    }
  ],
  "Petri Dish Drama": [
    {
      value: 100,
      clue: "When you use an EMB plate to block Gram-positive bacteria and only let Gram-negatives grow, you're using this type of media. It's basically a VIP list for bacteria.",
      answer: "What is selective media?"
    },
    {
      value: 200,
      clue: "When you're done with your stock cultures in lab, you should toss them in this specific container—not the regular trash, not the sharps, and definitely not the incubator.",
      answer: "What is the biohazard disposal container?"
    },
    {
      value: 300,
      clue: "Bacteria can grow on solid media using both an agar plate AND one of these tube-based surfaces. Together they give you colonies to admire from two different angles.",
      answer: "What is a test tube slant (agar plate and test tube slant)?"
    },
    {
      value: 400,
      clue: "These bacteria are the divas of the microbial world—they absolutely refuse to live where there's oxygen. The one gas they do NOT require is O₂.",
      answer: "What are anaerobic bacteria (obligate anaerobes)?"
    },
    {
      value: 500,
      clue: "Salt-loving bacteria that thrive in extremely salty environments like the Dead Sea or your grandma's pickle jar are called this—from the Greek word for 'salt.'",
      answer: "What are halophiles?"
    }
  ],
  "Pro vs. Eu": [
    {
      value: 100,
      clue: "This unicellular organism is characterized by lacking a nucleus, making it the minimalist of the cell world. Think bacteria—no fancy nuclear envelope needed.",
      answer: "What are bacteria (prokaryotes)?"
    },
    {
      value: 200,
      clue: "The three domains of life are Archaea, Bacteria, and Eukarya. 'Prokarya' is NOT one of them—even though it sounds like it should be. This fake domain is the odd one out.",
      answer: "What is Prokarya?"
    },
    {
      value: 300,
      clue: "Eukaryotic cells have ribosomes, a nucleus, AND organelles. When asked which characteristic is true, the answer is: all of them! Eukaryotes are basically the overachievers of the cell world.",
      answer: "What is 'all of the above' (ribosomes, nucleus, and organelles)?"
    },
    {
      value: 400,
      clue: "In the name Staphylococcus aureus, the second word 'aureus' represents this level of taxonomic classification—the most specific one in the binomial naming system.",
      answer: "What is species?"
    },
    {
      value: 500,
      clue: "This organelle is nicknamed the 'powerhouse of the cell' because it generates ATP. Even your microbiology professor runs on the energy this little guy produces.",
      answer: "What is the mitochondria?"
    }
  ]
};

let score = 0;
let answered = 0;
const total = 30;
const usedCells = new Set();

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  categories.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.textContent = cat;
    board.appendChild(header);
  });

  const values = [100, 200, 300, 400, 500];
  values.forEach(val => {
    categories.forEach(cat => {
      const cell = document.createElement('div');
      const id = cat + '-' + val;
      cell.className = 'cell';
      cell.id = id;
      cell.textContent = '$' + val;
      cell.addEventListener('click', () => openClue(cat, val, id));
      if (usedCells.has(id)) cell.classList.add('used');
      board.appendChild(cell);
    });
  });
}

function openClue(cat, val, id) {
  if (usedCells.has(id)) return;

  const clue = clues[cat].find(c => c.value === val);
  if (!clue) return;

  document.getElementById('modalCat').textContent = cat;
  document.getElementById('modalVal').textContent = '$' + val;
  document.getElementById('modalClue').textContent = clue.clue;
  document.getElementById('answerText').textContent = clue.answer;
  document.getElementById('answerArea').style.display = 'none';

  const btns = document.getElementById('modalButtons');
  btns.innerHTML = '';

  const revealBtn = document.createElement('button');
  revealBtn.className = 'btn btn-reveal';
  revealBtn.textContent = 'Reveal Answer';
  revealBtn.addEventListener('click', () => {
    document.getElementById('answerArea').style.display = 'block';
    btns.innerHTML = '';

    const correctBtn = document.createElement('button');
    correctBtn.className = 'btn btn-correct';
    correctBtn.textContent = 'I Got It!';
    correctBtn.addEventListener('click', () => {
      score += val;
      markUsed(id, true);
    });

    const wrongBtn = document.createElement('button');
    wrongBtn.className = 'btn btn-wrong';
    wrongBtn.textContent = 'Nope';
    wrongBtn.addEventListener('click', () => {
      score -= val;
      markUsed(id, false);
    });

    btns.appendChild(correctBtn);
    btns.appendChild(wrongBtn);
  });

  btns.appendChild(revealBtn);

  document.getElementById('modalOverlay').classList.add('active');
}

function markUsed(id, correct) {
  usedCells.add(id);
  answered++;

  const modal = document.getElementById('modal');
  modal.classList.remove('flash-correct', 'flash-wrong');
  void modal.offsetWidth;
  modal.classList.add(correct ? 'flash-correct' : 'flash-wrong');

  document.getElementById('score').textContent = (score >= 0 ? '$' : '-$') + Math.abs(score);
  document.getElementById('progress').textContent = answered + ' / ' + total;

  const cell = document.getElementById(id);
  if (cell) cell.classList.add('used');

  setTimeout(() => {
    document.getElementById('modalOverlay').classList.remove('active');
    modal.classList.remove('flash-correct', 'flash-wrong');

    if (answered >= total) showGameOver();
  }, 600);
}

function showGameOver() {
  document.getElementById('gameOver').classList.add('active');
  document.getElementById('finalScore').textContent = (score >= 0 ? '$' : '-$') + Math.abs(score);

  const maxScore = (100 + 200 + 300 + 400 + 500) * 6;
  const pct = score / maxScore;
  let rating;
  if (pct >= 0.8) rating = "Lab genius! You're ready to culture anything.";
  else if (pct >= 0.6) rating = "Solid work! Your Gram stain game is strong.";
  else if (pct >= 0.4) rating = "Not bad! A few more study sessions and you'll ace it.";
  else if (pct >= 0.2) rating = "Keep reviewing! Those microbes aren't going to memorize themselves.";
  else rating = "Time to hit the textbook! The bacteria believe in you.";

  document.getElementById('rating').textContent = rating;
}

function resetGame() {
  score = 0;
  answered = 0;
  usedCells.clear();
  document.getElementById('score').textContent = '$0';
  document.getElementById('progress').textContent = '0 / 30';
  document.getElementById('gameOver').classList.remove('active');
  document.getElementById('modalOverlay').classList.remove('active');
  buildBoard();
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});

buildBoard();
</script>
