<style>
  :root {
    --ground: #f7f8fa;
    --surface: #ffffff;
    --surface-2: #f2f4f7;
    --border: #e4e8ee;
    --border-strong: #cfd5de;
    --text: #141821;
    --text-muted: #5b6470;
    --text-faint: #8993a1;
    --accent: #1f6f7a;
    --accent-soft: #e6f0f1;
    --accent-strong: #175860;
    --good: #4a7c59;
    --good-soft: #e8efe9;
    --warn: #b47a3a;
    --warn-soft: #f5ecd9;
    --crit: #a54848;
    --crit-soft: #f2e0e0;
    --shadow: 0 1px 2px rgba(20,24,33,.04), 0 2px 6px rgba(20,24,33,.03);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #0d1014;
      --surface: #161a20;
      --surface-2: #1c2129;
      --border: #232932;
      --border-strong: #303845;
      --text: #e8ebf0;
      --text-muted: #8993a1;
      --text-faint: #5b6470;
      --accent: #3fb2c0;
      --accent-soft: #16323a;
      --accent-strong: #6bcfdb;
      --good: #7db089;
      --good-soft: #1e2d24;
      --warn: #d9a568;
      --warn-soft: #322818;
      --crit: #d47878;
      --crit-soft: #2e1e1e;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.3);
    }
  }
  :root[data-theme="light"] {
    --ground: #f7f8fa; --surface: #ffffff; --surface-2: #f2f4f7;
    --border: #e4e8ee; --border-strong: #cfd5de;
    --text: #141821; --text-muted: #5b6470; --text-faint: #8993a1;
    --accent: #1f6f7a; --accent-soft: #e6f0f1; --accent-strong: #175860;
    --good: #4a7c59; --good-soft: #e8efe9;
    --warn: #b47a3a; --warn-soft: #f5ecd9;
    --crit: #a54848; --crit-soft: #f2e0e0;
    --shadow: 0 1px 2px rgba(20,24,33,.04), 0 2px 6px rgba(20,24,33,.03);
  }
  :root[data-theme="dark"] {
    --ground: #0d1014; --surface: #161a20; --surface-2: #1c2129;
    --border: #232932; --border-strong: #303845;
    --text: #e8ebf0; --text-muted: #8993a1; --text-faint: #5b6470;
    --accent: #3fb2c0; --accent-soft: #16323a; --accent-strong: #6bcfdb;
    --good: #7db089; --good-soft: #1e2d24;
    --warn: #d9a568; --warn-soft: #322818;
    --crit: #d47878; --crit-soft: #2e1e1e;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.3);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ground); color: var(--text); font-family: var(--sans); font-size: 14.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; font-variant-numeric: tabular-nums; }
  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; }
  h1,h2,h3,h4 { margin: 0; font-weight: 600; letter-spacing: -0.01em; text-wrap: balance; }
  h1 { font-size: 20px; }
  h2 { font-size: 16px; }
  h3 { font-size: 13.5px; }
  p { margin: 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ---------- Banner ---------- */
  .banner {
    background: var(--crit-soft); color: var(--crit); border-bottom: 1px solid var(--crit);
    padding: 8px 20px; font-size: 12.5px; text-align: center; font-weight: 500;
    letter-spacing: 0.01em;
  }
  .banner strong { font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11.5px; }

  /* ---------- Shell ---------- */
  .shell { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 34px); }
  .rail {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px 14px; display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 0; height: calc(100vh - 34px); overflow-y: auto;
  }
  .brand {
    padding: 4px 10px 20px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    display: grid; place-items: center; color: white; font-weight: 700; font-size: 13px;
    font-family: var(--mono);
  }
  .brand-name { font-weight: 600; letter-spacing: -0.01em; }
  .brand-sub { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    background: transparent; border: 0; color: var(--text-muted);
    text-align: left; font-size: 13.5px; transition: background 120ms, color 120ms;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-strong); font-weight: 500; }
  .nav-item .ic { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .nav-group { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 14px 10px 6px; }

  .rail-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 4px; }
  .icon-btn {
    display: grid; place-items: center; width: 32px; height: 32px;
    background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm);
    color: var(--text-muted);
  }
  .icon-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .icon-btn .ic { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; }

  .main { padding: 28px 32px 80px; max-width: 1180px; width: 100%; margin: 0 auto; }
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .page-title { }
  .page-title .eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 10.5px; color: var(--text-faint); margin-bottom: 4px; }
  .page-title h1 { font-size: 22px; }
  .page-sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; max-width: 60ch; }
  .page-actions { display: flex; gap: 8px; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text);
    transition: border-color 120ms, background 120ms;
  }
  .btn:hover { border-color: var(--text-faint); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-danger { color: var(--crit); border-color: var(--crit); background: transparent; }
  .btn-danger:hover { background: var(--crit-soft); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }

  /* ---------- Cards ---------- */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; box-shadow: var(--shadow);
  }
  .card + .card { margin-top: 16px; }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .card-head h2 { font-size: 15px; }
  .card-head .card-sub { font-size: 12px; color: var(--text-muted); }

  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
  @media (max-width: 800px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

  /* ---------- KPI ---------- */
  .kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; flex-direction: column; gap: 4px;
  }
  .kpi-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); }
  .kpi-value { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .kpi-value .unit { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: 4px; letter-spacing: 0; }
  .kpi-delta { font-size: 11.5px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .kpi-delta.up { color: var(--good); }
  .kpi-delta.down { color: var(--crit); }
  .kpi-spark { margin-top: 6px; height: 32px; }

  /* ---------- Forms ---------- */
  label.field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-muted); }
  label.field.inline { flex-direction: row; align-items: center; gap: 8px; font-size: 13px; color: var(--text); }
  input[type=text], input[type=number], input[type=date], input[type=time], input[type=datetime-local], input[type=password], select, textarea {
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    padding: 7px 10px; color: var(--text); font-size: 13.5px; transition: border-color 120ms;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
  textarea { min-height: 72px; font-family: inherit; resize: vertical; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }

  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 14px; }
  .form-row.three { grid-template-columns: repeat(3, 1fr); }
  .form-row.four { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 640px) { .form-row, .form-row.three, .form-row.four { grid-template-columns: 1fr; } }

  /* ---------- Chips / pills ---------- */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px; font-size: 11.5px;
    background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border);
  }
  .chip.good { background: var(--good-soft); color: var(--good); border-color: transparent; }
  .chip.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .chip.crit { background: var(--crit-soft); color: var(--crit); border-color: transparent; }
  .chip.accent { background: var(--accent-soft); color: var(--accent-strong); border-color: transparent; }

  .severity-stripe { display: inline-block; width: 3px; align-self: stretch; border-radius: 2px; background: var(--border-strong); }
  .severity-stripe.good { background: var(--good); }
  .severity-stripe.warn { background: var(--warn); }
  .severity-stripe.crit { background: var(--crit); }

  /* ---------- Tables ---------- */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data th, table.data td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  table.data th { color: var(--text-faint); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; }
  table.data td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.data tr:last-child td { border-bottom: 0; }
  table.data tr:hover td { background: var(--surface-2); }

  /* ---------- Quick log tiles ---------- */
  .med-tile {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    transition: border-color 120ms;
  }
  .med-tile:hover { border-color: var(--accent); }
  .med-tile.logged { background: var(--good-soft); border-color: var(--good); }
  .med-swatch {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent-soft); color: var(--accent-strong);
    display: grid; place-items: center; font-weight: 600; font-size: 12px; flex-shrink: 0;
    font-family: var(--mono);
  }
  .med-body { flex: 1; min-width: 0; }
  .med-name { font-weight: 500; font-size: 13.5px; }
  .med-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }

  /* ---------- Body map ---------- */
  .body-map { display: block; margin: 0 auto; max-width: 260px; width: 100%; }
  .body-map .zone { fill: var(--surface-2); stroke: var(--border-strong); stroke-width: 1; cursor: pointer; transition: fill 120ms; }
  .body-map .zone:hover { fill: var(--accent-soft); }
  .body-map .zone.selected { fill: var(--accent); stroke: var(--accent-strong); }
  .body-map .outline { fill: none; stroke: var(--border-strong); stroke-width: 1.25; }
  .body-map .heat-1 { fill: rgba(180,122,58,.35); }
  .body-map .heat-2 { fill: rgba(180,122,58,.65); }
  .body-map .heat-3 { fill: rgba(165,72,72,.7); }

  /* ---------- Mobile ---------- */
  .mobile-tabs { display: none; }
  @media (max-width: 780px) {
    .shell { grid-template-columns: 1fr; }
    .rail { display: none; }
    .main { padding: 20px 16px 100px; }
    .page-head { flex-direction: column; align-items: stretch; }
    .mobile-tabs {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 6px 4px calc(6px + env(safe-area-inset-bottom)); z-index: 20;
    }
    .mobile-tabs .nav-item { flex-direction: column; gap: 2px; padding: 6px 2px; font-size: 10.5px; text-align: center; justify-content: center; }
    .mobile-tabs .nav-item .ic { width: 18px; height: 18px; }
  }

  /* ---------- Panel / dialog ---------- */
  .panel-backdrop {
    position: fixed; inset: 0; background: rgba(10,12,16,.5); z-index: 40;
    display: grid; place-items: center; padding: 20px;
  }
  .panel {
    background: var(--surface); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.25);
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .panel-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
  .panel-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* ---------- Empty ---------- */
  .empty { text-align: center; padding: 30px 16px; color: var(--text-muted); font-size: 13px; }
  .empty h3 { color: var(--text); margin-bottom: 6px; }

  /* ---------- Sparkline / mini charts ---------- */
  .spark { display: block; width: 100%; height: 100%; }
  .spark path.line { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .spark path.fill { fill: var(--accent-soft); stroke: none; opacity: .8; }
  .spark circle.pt { fill: var(--accent); }
  .spark .grid { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 3; }
  .spark .axis { stroke: var(--text-faint); stroke-width: 1; }
  .spark text { fill: var(--text-faint); font-size: 10px; font-family: var(--mono); }
  .spark .band-good { fill: var(--good-soft); opacity: .6; }

  /* ---------- Utility ---------- */
  .mono { font-family: var(--mono); }
  .muted { color: var(--text-muted); }
  .faint { color: var(--text-faint); }
  .row { display: flex; align-items: center; gap: 8px; }
  .row.between { justify-content: space-between; }
  .stack { display: flex; flex-direction: column; }
  .stack.gap-4 { gap: 4px; } .stack.gap-8 { gap: 8px; } .stack.gap-12 { gap: 12px; } .stack.gap-16 { gap: 16px; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .badge-count { background: var(--surface-2); color: var(--text-muted); padding: 1px 6px; border-radius: 999px; font-size: 11px; margin-left: auto; }

  hr.rule { border: 0; border-top: 1px solid var(--border); margin: 14px 0; }

  .flag-note {
    background: var(--warn-soft); color: var(--warn); border-left: 3px solid var(--warn);
    padding: 10px 12px; border-radius: var(--radius-sm); font-size: 12.5px;
  }
  .flag-note.info { background: var(--accent-soft); color: var(--accent-strong); border-color: var(--accent); }
  .flag-note.crit { background: var(--crit-soft); color: var(--crit); border-color: var(--crit); }
</style>

<script>
/* =========================================================
   REGIMEN — Personal Tracker
   Single-file client-side app. All data in localStorage.
   No network calls. Chart.js loaded from CDN when available
   (GitHub Pages); graceful SVG fallback otherwise.
   ========================================================= */

const LS_KEY = 'tehrani.regimen.v1';
const SCHEMA_VERSION = 1;

/* ---------- Icons (inline SVG paths for nav) ---------- */
const ICONS = {
  today:  '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  log:    '<path d="M4 6h16M4 12h16M4 18h10"/>',
  regimen:'<path d="M9 3h6v4h4v14H5V7h4V3z"/><path d="M12 11v6M9 14h6"/>',
  inject: '<path d="M17 3l4 4-2 2-4-4 2-2z"/><path d="M15 5L4 16v4h4L19 9"/>',
  labs:   '<path d="M9 3v6l-5 9a3 3 0 0 0 2.6 4.5h10.8A3 3 0 0 0 20 18l-5-9V3"/><path d="M9 3h6"/>',
  trends: '<path d="M4 19V5M4 19h16"/><path d="M7 15l4-4 3 3 5-7"/>',
  pk:     '<path d="M4 20c4 0 4-14 8-14s4 14 8 14"/><path d="M4 20h16"/>',
  data:   '<ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>',
};

/* ---------- State / storage ---------- */
const defaultState = () => ({
  version: SCHEMA_VERSION,
  profile: {
    heightCm: 178,
    sexAtBirth: '',
    dob: '',
    startedAt: new Date().toISOString(),
  },
  regimen: [], // {id,name,generic,cls,route,dose,unit,freq,color,notes,conc,concUnit}
  logs: [],    // {id,date,type,payload}
  labs: [],    // {id,analyte,unit,value,date,rangeLow,rangeHigh}
  labRanges: {}, // analyte -> {low,high,unit}
  injectionSites: [], // {id,date,side,zone,medId}
  settings: { units: 'imperial', theme: 'auto' },
});

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return seedData(defaultState());
    const parsed = JSON.parse(raw);
    if (!parsed.version) return seedData(defaultState());
    return parsed;
  } catch (e) {
    console.warn('State load failed, seeding fresh', e);
    return seedData(defaultState());
  }
}
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function todayIso() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { const dt = new Date(d); return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); }
function fmtDateShort(d) { const dt = new Date(d); return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0,10); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function kgFromLbs(lbs) { return lbs * 0.453592; }
function lbsFromKg(kg) { return kg / 0.453592; }

/* ---------- Panels ---------- */
function openPanel({ title, body, actions }) {
  const root = document.getElementById('panel-root');
  root.innerHTML = '';
  const backdrop = el('div', { className: 'panel-backdrop' });
  backdrop.onclick = (e) => { if (e.target === backdrop) closePanel(); };
  const panel = el('div', { className: 'panel', role: 'dialog', 'aria-modal': 'true' });
  const head = el('div', { className: 'panel-head' },
    el('h2', { textContent: title }),
    el('button', { className: 'icon-btn', 'aria-label': 'Close', onclick: closePanel,
      innerHTML: '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M6 6l12 12M18 6L6 18"/></svg>' })
  );
  const b = el('div', { className: 'panel-body' });
  if (typeof body === 'string') b.innerHTML = body;
  else if (body instanceof Node) b.appendChild(body);
  const foot = el('div', { className: 'panel-foot' });
  (actions || [{ label: 'Close', onclick: closePanel }]).forEach(a => {
    const btn = el('button', { className: 'btn ' + (a.primary ? 'btn-primary' : ''), textContent: a.label, onclick: a.onclick });
    foot.appendChild(btn);
  });
  panel.appendChild(head); panel.appendChild(b); panel.appendChild(foot);
  backdrop.appendChild(panel);
  root.appendChild(backdrop);
}
function closePanel() { document.getElementById('panel-root').innerHTML = ''; }

/* ---------- DOM helpers ---------- */
function el(tag, props, ...children) {
  const n = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (k === 'className') n.className = v;
    else if (k === 'textContent') n.textContent = v;
    else if (k === 'innerHTML') n.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(n.style, v);
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== null && v !== undefined) n.setAttribute(k, v);
  }
  children.flat().forEach(c => { if (c === null || c === undefined) return; n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return n;
}
function html(strings, ...vals) { return strings.map((s,i)=> s + (vals[i]!==undefined?vals[i]:'')).join(''); }

/* ---------- Derived helpers ---------- */
function medById(id) { return state.regimen.find(m => m.id === id); }
function logsBetween(fromIso, toIso) {
  return state.logs.filter(l => l.date >= fromIso && l.date <= toIso).sort((a,b) => a.date.localeCompare(b.date));
}
function latestLog(type) {
  const filtered = state.logs.filter(l => l.type === type).sort((a,b) => b.date.localeCompare(a.date));
  return filtered[0];
}
function weightSeries(days = 90) {
  const from = daysAgo(days);
  return state.logs.filter(l => l.type === 'weight' && l.date >= from)
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(l => ({ date: l.date, value: l.payload.kg }));
}
function appetiteSeries(days = 90) {
  const from = daysAgo(days);
  return state.logs.filter(l => l.type === 'appetite' && l.date >= from)
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(l => ({ date: l.date, value: l.payload.score }));
}
function adherenceForMed(medId, days) {
  const med = medById(medId); if (!med) return { taken: 0, expected: 0, pct: 0 };
  const expected = expectedDoses(med, days);
  const from = daysAgo(days);
  const taken = state.logs.filter(l => l.type === 'dose' && l.payload.medId === medId && l.date >= from).length;
  return { taken, expected, pct: expected === 0 ? 0 : Math.min(100, Math.round(100 * taken / expected)) };
}
function expectedDoses(med, days) {
  if (med.freq === 'daily') return days;
  if (med.freq === 'weekly') return Math.max(1, Math.round(days / 7));
  if (med.freq === 'twice-weekly') return Math.max(1, Math.round(days / 3.5));
  if (med.freq === 'every-other-day') return Math.max(1, Math.round(days / 2));
  if (med.freq === 'custom') {
    const iv = med.freqDetail?.intervalDays || 7;
    return Math.max(1, Math.round(days / iv));
  }
  return days;
}
function bmi(kg, cm) {
  if (!kg || !cm) return null;
  const m = cm / 100;
  return +(kg / (m*m)).toFixed(1);
}
function bmiCategory(v) {
  if (v == null) return { label: '—', cls: '' };
  if (v < 18.5) return { label: 'Underweight', cls: 'warn' };
  if (v < 25) return { label: 'Normal', cls: 'good' };
  if (v < 30) return { label: 'Overweight', cls: 'warn' };
  return { label: 'Obese', cls: 'crit' };
}

/* ---------- Sparkline (SVG, always renders) ---------- */
function sparkline(series, opts = {}) {
  const w = opts.width || 200, h = opts.height || 32;
  if (!series.length) return `<svg class="spark" viewBox="0 0 ${w} ${h}"><text x="4" y="${h/2+3}">no data</text></svg>`;
  const values = series.map(s => s.value);
  const min = Math.min(...values), max = Math.max(...values);
  const pad = (max - min) * 0.15 || 1;
  const yMin = min - pad, yMax = max + pad;
  const x = i => (series.length === 1 ? w/2 : (i/(series.length-1)) * (w-4) + 2);
  const y = v => h - 2 - ((v - yMin)/(yMax - yMin || 1)) * (h - 4);
  const linePath = series.map((s,i) => `${i===0?'M':'L'}${x(i).toFixed(1)},${y(s.value).toFixed(1)}`).join(' ');
  const fillPath = linePath + ` L${x(series.length-1).toFixed(1)},${h} L${x(0).toFixed(1)},${h} Z`;
  const last = series[series.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="fill" d="${fillPath}"/>
    <path class="line" d="${linePath}"/>
    <circle class="pt" cx="${x(series.length-1).toFixed(1)}" cy="${y(last.value).toFixed(1)}" r="2.2"/>
  </svg>`;
}

/* Full SVG line chart with axis, grid, band */
function svgLineChart(series, opts = {}) {
  const w = opts.width || 640, h = opts.height || 220;
  const padL = 42, padR = 12, padT = 14, padB = 26;
  if (!series.length) return `<svg class="spark" viewBox="0 0 ${w} ${h}"><text x="${w/2-30}" y="${h/2}">no data yet</text></svg>`;
  const values = series.map(s => s.value);
  let min = opts.yMin !== undefined ? opts.yMin : Math.min(...values);
  let max = opts.yMax !== undefined ? opts.yMax : Math.max(...values);
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.1;
  const yMin = opts.yMin !== undefined ? opts.yMin : min - pad;
  const yMax = opts.yMax !== undefined ? opts.yMax : max + pad;
  const x = i => padL + (series.length === 1 ? (w-padL-padR)/2 : (i/(series.length-1)) * (w-padL-padR));
  const y = v => h - padB - ((v - yMin)/(yMax - yMin || 1)) * (h - padT - padB);

  const gridLines = 4;
  let grid = '';
  for (let i = 0; i <= gridLines; i++) {
    const val = yMin + (yMax-yMin) * (i/gridLines);
    const yy = y(val);
    grid += `<line class="grid" x1="${padL}" x2="${w-padR}" y1="${yy}" y2="${yy}"/>`;
    grid += `<text x="${padL-6}" y="${yy+3}" text-anchor="end">${val.toFixed(val<10?1:0)}</text>`;
  }

  let band = '';
  if (opts.band) {
    const y1 = y(opts.band.high), y2 = y(opts.band.low);
    band = `<rect class="band-good" x="${padL}" y="${Math.min(y1,y2)}" width="${w-padL-padR}" height="${Math.abs(y2-y1)}"/>`;
  }

  const linePath = series.map((s,i) => `${i===0?'M':'L'}${x(i).toFixed(1)},${y(s.value).toFixed(1)}`).join(' ');
  const fillPath = linePath + ` L${x(series.length-1).toFixed(1)},${h-padB} L${x(0).toFixed(1)},${h-padB} Z`;

  const dots = series.map((s,i) => `<circle class="pt" cx="${x(i).toFixed(1)}" cy="${y(s.value).toFixed(1)}" r="2.5"/>`).join('');

  const xTicks = series.length <= 6 ? series.map((s,i)=>i) : [0, Math.floor(series.length/3), Math.floor(2*series.length/3), series.length-1];
  const xLabels = xTicks.map(i => `<text x="${x(i).toFixed(1)}" y="${h-8}" text-anchor="middle">${fmtDateShort(series[i].date)}</text>`).join('');

  return `<svg viewBox="0 0 ${w} ${h}" class="spark" preserveAspectRatio="xMidYMid meet">
    ${band}${grid}<path class="fill" d="${fillPath}" style="opacity:.35"/><path class="line" d="${linePath}"/>${dots}${xLabels}
  </svg>`;
}

function daysSince(med) {
  if (!med) return null;
  const first = state.logs.filter(l => l.type === 'dose' && l.payload.medId === med.id).sort((a,b) => a.date.localeCompare(b.date))[0];
  if (!first) return null;
  return daysBetween(first.date, todayIso());
}
function isDueToday(m) {
  if (m.freq === 'daily') return true;
  const last = state.logs.filter(l => l.type === 'dose' && l.payload.medId === m.id).sort((a,b) => b.date.localeCompare(a.date))[0];
  if (!last) return true;
  const iv = m.freq === 'weekly' ? 7 : m.freq === 'twice-weekly' ? 3 : m.freq === 'every-other-day' ? 2 : (m.freqDetail?.intervalDays || 7);
  return daysBetween(last.date, todayIso()) >= iv;
}

function weightDisplay(kg) {
  if (state.settings.units === 'imperial') return `${lbsFromKg(kg).toFixed(1)}<span class="unit">lb</span>`;
  return `${kg.toFixed(1)}<span class="unit">kg</span>`;
}

function kpiCard(label, value, sub, series, cls) {
  const c = el('div', { className: 'kpi' });
  c.appendChild(el('div', { className: 'kpi-label', textContent: label }));
  const v = el('div', { className: 'kpi-value' });
  v.innerHTML = value;
  c.appendChild(v);
  if (sub) {
    const s = el('div', { className: 'kpi-delta' });
    if (cls) s.appendChild(el('span', { className: 'chip ' + cls, textContent: sub }));
    else s.textContent = sub;
    c.appendChild(s);
  }
  if (series && series.length) {
    const sp = el('div', { className: 'kpi-spark' });
    sp.innerHTML = sparkline(series, { width: 240, height: 32 });
    c.appendChild(sp);
  }
  return c;
}

function pageHead(eyebrow, title, sub, actions) {
  const h = el('div', { className: 'page-head' });

  if (actions?.length) {

    actions.forEach(x => a.appendChild(el('button', { className: 'btn ' + (x.primary ? 'btn-primary' : ''), textContent: x.label, onclick: x.onclick })));
    h.appendChild(a);
  }
  return h;
}

function emptyState(title, sub, cta, onclick) {

    ? el('select', {}, ...['left thigh','right thigh','left glute','right glute','left abdomen','right abdomen','left deltoid','right deltoid'].map(s => el('option', { value: s, textContent: s })))
    : null;
  const notes = el('textarea', { placeholder: 'Notes (optional)' });

function pageLog() {
  const wrap = el('div');
  wrap.appendChild(pageHead('History', 'Log', 'All captured entries, most recent first. Click to edit or delete.', []));

  const filter = el('select', {}, ...['all','dose','weight','appetite','note'].map(t => el('option', { value: t, textContent: t })));
  const filtCard = el('div', { className: 'card' });
  filtCard.appendChild(el('div', { className: 'row', style: { gap: '12px' } },
    el('div', { className: 'faint', style: { fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.08em' }, textContent: 'Filter' }),
    filter,
    el('div', { className: 'muted', style: { marginLeft: 'auto', fontSize: '12px' }, textContent: `${state.logs.length} total entries` })
  ));
  const listWrap = el('div', { className: 'table-wrap', style: { marginTop: '12px' } });
  filtCard.appendChild(listWrap);

  const draw = () => {
    listWrap.innerHTML = '';
    const type = filter.value;
    const entries = state.logs.filter(l => type === 'all' || l.type === type).sort((a,b) => b.date.localeCompare(a.date));
    if (!entries.length) { listWrap.appendChild(emptyState('No entries', 'Nothing logged yet.')); return; }
    const table = el('table', { className: 'data' });
    table.innerHTML = '<thead><tr><th>Date</th><th>Type</th><th>Detail</th><th></th></tr></thead>';
    const tb = el('tbody');
    entries.forEach(e => {
      const tr = el('tr');
      tr.appendChild(el('td', { textContent: fmtDate(e.date) }));
      tr.appendChild(el('td', { innerHTML: `<span class="chip ${chipColor(e.type)}">${e.type}</span>` }));
      tr.appendChild(el('td', { innerHTML: entryDetail(e) }));
      const td = el('td');
      const del = el('button', { className: 'btn btn-sm btn-ghost', textContent: 'Delete', onclick: () => {
        if (!confirm('Delete this entry?')) return;
        state.logs = state.logs.filter(x => x.id !== e.id);
        save(); draw();
      }});
      td.appendChild(del);
      tr.appendChild(td);
      tb.appendChild(tr);
    });
    table.appendChild(tb);
    listWrap.appendChild(table);
  };
  filter.oninput = draw;
  draw();
  wrap.appendChild(filtCard);
  return wrap;
}
function chipColor(t) { return t === 'dose' ? 'accent' : t === 'weight' ? '' : t === 'appetite' ? 'good' : t === 'note' ? 'warn' : ''; }
function entryDetail(e) {
  if (e.type === 'dose') {
    const m = medById(e.payload.medId);
    return `${m ? m.name : '(deleted med)'} — ${e.payload.dose} ${e.payload.unit}${e.payload.site ? ' · ' + e.payload.site : ''}${e.payload.notes ? ' · ' + e.payload.notes : ''}`;
  }
  if (e.type === 'weight') return `${e.payload.kg.toFixed(1)} kg (${lbsFromKg(e.payload.kg).toFixed(1)} lb)`;
  if (e.type === 'appetite') return `${e.payload.score}/10${e.payload.notes ? ' — ' + e.payload.notes : ''}`;
  if (e.type === 'note') return `${e.payload.text}${e.payload.tags?.length ? ' [' + e.payload.tags.join(', ') + ']' : ''}`;
  return '';
}

function interpretLab(value, range) {
  if (!range) return { cls: '', label: 'no range', note: null };
  const span = range.high - range.low;
  if (value < range.low - span * 0.25) return { cls: 'crit', label: 'well below range', note: `Value ${value} is well below your target ${range.low}–${range.high}. Clinical judgment required.` };
  if (value < range.low) return { cls: 'warn', label: 'below range', note: `Value ${value} is below your target lower bound of ${range.low}.` };
  if (value > range.high + span * 0.25) return { cls: 'crit', label: 'well above range', note: `Value ${value} exceeds your target ${range.low}–${range.high} by more than 25%. Clinical judgment required.` };
  if (value > range.high) return { cls: 'warn', label: 'above range', note: `Value ${value} is above your target upper bound of ${range.high}.` };
  return { cls: 'good', label: 'in target range', note: null };
}

function download(name, content, mime) {

  const meds = state.regimen.map(m => `<tr><td>${m.name}</td><td>${m.cls}</td><td>${m.route}</td><td>${m.dose} ${m.unit}</td><td>${m.freq}</td></tr>`).join('');
  const last6mo = daysAgo(180);
  const recentLabs = state.labs.filter(l => l.date >= last6mo).sort((a,b) => b.date.localeCompare(a.date));
  const labRows = recentLabs.map(l => `<tr><td>${l.date}</td><td>${l.analyte}</td><td>${l.value} ${state.labRanges[l.analyte]?.unit || ''}</td><td>${state.labRanges[l.analyte] ? state.labRanges[l.analyte].low + '–' + state.labRanges[l.analyte].high : ''}</td></tr>`).join('');
  const wLast = state.logs.filter(l => l.type === 'weight').slice(-3).map(l => `${l.date}: ${l.payload.kg.toFixed(1)} kg`).join(' · ');
  const dose30 = state.regimen.map(m => { const a = adherenceForMed(m.id, 30); return `<tr><td>${m.name}</td><td>${a.taken}/${a.expected}</td><td>${a.pct}%</td></tr>`; }).join('');

  return `<!DOCTYPE html><html><head><title>Clinician summary — ${todayIso()}</title>
    <style>
      body{font:14px/1.5 -apple-system,system-ui,sans-serif;color:#141821;max-width:820px;margin:40px auto;padding:0 20px}
      h1,h2{margin:0 0 6px}h2{font-size:15px;margin-top:24px;padding-bottom:4px;border-bottom:1px solid #ccc}
      table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
      th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #eee}
      th{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#666}
      .muted{color:#666;font-size:12px}
      .note{font-size:11px;color:#a54848;border:1px solid #a54848;padding:6px 10px;border-radius:4px;margin-top:16px}
      @media print { body { margin: 0; } .note { break-inside: avoid; } }
    </style></head><body>
    <h1>Regimen summary</h1>
    <div class="muted">Generated ${new Date().toLocaleString()} · Patient self-report · Not a medical record</div>

    <h2>Profile</h2>
    <div>Height: ${state.profile.heightCm} cm · Sex at birth: ${state.profile.sexAtBirth || '—'} · DOB: ${state.profile.dob || '—'}</div>
    <div class="muted">Recent weights: ${wLast || '—'}</div>

    <h2>Current regimen</h2>
    <table><thead><tr><th>Medication</th><th>Class</th><th>Route</th><th>Dose</th><th>Frequency</th></tr></thead><tbody>${meds || '<tr><td colspan="5" class="muted">None recorded</td></tr>'}</tbody></table>

    <h2>Adherence — last 30 days</h2>
    <table><thead><tr><th>Medication</th><th>Taken / Expected</th><th>%</th></tr></thead><tbody>${dose30 || ''}</tbody></table>

    <h2>Lab values — last 6 months</h2>
    <table><thead><tr><th>Date</th><th>Analyte</th><th>Value</th><th>Personal target</th></tr></thead><tbody>${labRows || '<tr><td colspan="4" class="muted">No labs recorded</td></tr>'}</tbody></table>

    <div class="note">
      Personal target ranges are user-defined and do not represent laboratory reference intervals. Interpretive statements in the source application are for personal use only.
    </div>
    <div class="muted" style="margin-top:20px">Print this window (⌘/Ctrl-P) to save as PDF.</div>
    </body></html>`;
}

/* ---------- Boot ---------- */
render();
</script>
