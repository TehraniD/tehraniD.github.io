<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATI Comprehensive Predictor Study Guide 2026 — Part 2 of 4</title>
    <style>
      :root {
        --primary: #0077b6;
        --primary-dark: #005f8a;
        --accent: #00b4d8;
        --success: #2d6a4f;
        --success-bg: #d8f3dc;
        --danger: #d00000;
        --danger-bg: #fde8e8;
        --warning: #e85d04;
        --warning-bg: #fff3cd;
        --bg: #f0f4f8;
        --card: #ffffff;
        --text: #1d3557;
        --text-light: #457b9d;
        --border: #dee2e6;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      .top-bar {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #fff;
        padding: 18px 24px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      .top-bar h1 {
        font-size: 1.3rem;
        font-weight: 700;
      }
      .top-bar .subtitle {
        font-size: 0.85rem;
        opacity: 0.85;
        margin-top: 2px;
      }
      .progress-wrap {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        height: 8px;
        margin-top: 10px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--accent);
        border-radius: 10px;
        transition: width 0.4s ease;
        width: 0%;
      }
      .stats-row {
        display: flex;
        gap: 16px;
        margin-top: 8px;
        font-size: 0.8rem;
      }
      .stats-row span {
        opacity: 0.9;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 20px 16px 80px;
      }
      .mode-toggle {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .mode-btn {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        border: 2px solid var(--border);
        background: #fff;
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .topic-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .topic-chip {
        padding: 4px 12px;
        border-radius: 16px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: #fff;
        transition: all 0.2s;
      }
      .topic-chip.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .q-card {
        background: var(--card);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
        border-left: 4px solid var(--primary);
        transition: border-color 0.3s;
      }
      .q-card.answered-correct {
        border-left-color: var(--success);
      }
      .q-card.answered-incorrect {
        border-left-color: var(--danger);
      }
      .q-number {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .q-type {
        display: inline-block;
        background: var(--warning-bg);
        color: var(--warning);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 8px;
      }
      .q-stem {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 10px 0 16px;
        line-height: 1.5;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .option {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        border: 2px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .option:hover:not(.disabled) {
        border-color: var(--primary);
        background: #f0f7ff;
      }
      .option.selected {
        border-color: var(--primary);
        background: #e3f2fd;
      }
      .option.correct {
        border-color: var(--success);
        background: var(--success-bg);
      }
      .option.incorrect-selected {
        border-color: var(--danger);
        background: var(--danger-bg);
      }
      .option.disabled {
        cursor: default;
        opacity: 0.85;
      }
      .option .letter {
        min-width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.8rem;
        background: #e9ecef;
        color: var(--text);
        flex-shrink: 0;
      }
      .option.selected .letter {
        background: var(--primary);
        color: #fff;
      }
      .option.correct .letter {
        background: var(--success);
        color: #fff;
      }
      .option.incorrect-selected .letter {
        background: var(--danger);
        color: #fff;
      }
      .checkbox-indicator {
        min-width: 20px;
        height: 20px;
        border: 2px solid #adb5bd;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .option.selected .checkbox-indicator {
        background: var(--primary);
        border-color: var(--primary);
      }
      .option.correct .checkbox-indicator {
        background: var(--success);
        border-color: var(--success);
      }
      .option.incorrect-selected .checkbox-indicator {
        background: var(--danger);
        border-color: var(--danger);
      }
      .btn {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 12px;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-primary:disabled {
        background: #adb5bd;
        cursor: default;
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
      }
      .btn-outline:hover {
        background: #e3f2fd;
      }
      .rationale {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }
      .rationale.show {
        display: block;
      }
      .rationale.correct-rationale {
        background: var(--success-bg);
        border: 1px solid #b7e4c7;
      }
      .rationale.incorrect-rationale {
        background: var(--danger-bg);
        border: 1px solid #f5c6cb;
      }
      .rationale strong {
        display: block;
        margin-bottom: 4px;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 0.9rem;
      }
      .data-table th,
      .data-table td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .data-table th {
        background: #e9ecef;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .data-table tr:nth-child(even) {
        background: #f8f9fa;
      }
      .bowtie {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        margin: 12px 0;
      }
      .bowtie-col {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .bowtie-col h4 {
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 6px;
        font-weight: 700;
      }
      .bowtie-col ul {
        padding-left: 16px;
        font-size: 0.88rem;
      }
      .bowtie-col li {
        margin-bottom: 4px;
      }
      .matrix-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
      }
      .matrix-table th,
      .matrix-table td {
        padding: 10px;
        border: 1px solid var(--border);
        text-align: center;
      }
      .matrix-table th {
        background: var(--primary);
        color: #fff;
        font-size: 0.8rem;
      }
      .matrix-table td:first-child {
        text-align: left;
        font-weight: 600;
      }
      .matrix-table .check {
        color: var(--success);
        font-size: 1.2rem;
      }
      .trend-arrow {
        color: var(--danger);
        font-weight: 700;
      }
      .trend-arrow.up {
        color: var(--danger);
      }
      .trend-arrow.down {
        color: var(--success);
      }
      .results-panel {
        background: var(--card);
        border-radius: 12px;
        padding: 24px;
        box-shadow: var(--shadow);
        text-align: center;
        margin-top: 20px;
      }
      .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 16px auto;
        font-size: 2rem;
        font-weight: 800;
        border: 6px solid;
      }
      .score-circle.pass {
        border-color: var(--success);
        color: var(--success);
      }
      .score-circle.fail {
        border-color: var(--danger);
        color: var(--danger);
      }
      .score-circle small {
        font-size: 0.7rem;
        font-weight: 500;
      }
      .hidden {
        display: none !important;
      }
      .nav-links {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        margin-top: 20px;
        border-top: 2px solid var(--border);
      }
      .nav-links a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        text-decoration: none;
        font-size: 0.9rem;
        background: var(--primary);
        color: #fff;
        transition: all 0.2s;
      }
      .nav-links a:hover {
        background: var(--primary-dark);
      }
      .footer {
        text-align: center;
        padding: 30px 16px 20px;
        color: var(--text-light);
        font-size: 0.85rem;
        border-top: 1px solid var(--border);
        margin-top: 40px;
      }
      .footer .brand {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      @media (max-width: 600px) {
        .bowtie {
          grid-template-columns: 1fr;
        }
        .container {
          padding: 12px 10px 60px;
        }
        .q-card {
          padding: 16px;
        }
        .top-bar h1 {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <h1>ATI Comprehensive Predictor Study Guide 2026</h1>
      <div class="subtitle">
        Interactive Study Guide — Part 2 of 4 (Questions 46–90)
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="stats-row">
        <span>✅ Correct: <strong id="correctCount">0</strong></span>
        <span>❌ Incorrect: <strong id="incorrectCount">0</strong></span>
        <span>📊 Score: <strong id="scorePercent">0%</strong></span>
        <span>📝 Answered: <strong id="answeredCount">0</strong>/45</span>
      </div>
    </div>

    <div class="container">
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('quiz')">
          📝 Quiz Mode
        </button>
        <button class="mode-btn" onclick="setMode('review')">
          📖 Review Mode
        </button>
        <button class="mode-btn" onclick="setMode('missed')">
          🔴 Missed Only
        </button>
        <button class="mode-btn" onclick="resetAll()">🔄 Reset</button>
      </div>

      <div class="topic-filter" id="topicFilter"></div>
      <div id="questionsContainer"></div>

      <div class="results-panel hidden" id="resultsPanel">
        <h2>Part 2 Complete!</h2>
        <div class="score-circle" id="scoreCircle">
          <span id="finalScore">0%</span>
          <small>Score</small>
        </div>
        <p id="resultMessage"></p>
        <button
          class="btn btn-primary"
          onclick="resetAll()"
          style="margin-top: 16px"
        >
          Retake Quiz
        </button>
        <button
          class="btn btn-outline"
          onclick="setMode('missed')"
          style="margin-top: 16px"
        >
          Review Missed
        </button>
      </div>

      <div class="nav-links">
        <a href="RN_Comprehensive_Predictor_Part1.html">← Part 1 (Q1–45)</a>
        <span style="color: var(--text-light); font-weight: 600"
          >Part 2 of 4</span
        >
        <a href="RN_Comprehensive_Predictor_Part3.html">Part 3 (Q91–135) →</a>
      </div>

      <div class="footer">
        <div class="brand">TehraniLabs</div>
        <div>ATI Comprehensive Predictor Study Guide 2026</div>
      </div>
    </div>

    <script>
      const questions = [
        {
          id: 46,
          topic: "Pediatrics",
          type: "Single",
          stem: "Which immunization is contraindicated in pregnancy?",
          options: [
            { letter: "A", text: "Tdap", correct: false },
            { letter: "B", text: "Influenza (inactivated)", correct: false },
            { letter: "C", text: "MMR", correct: true },
            { letter: "D", text: "Hep B", correct: false },
          ],
          rationale:
            "MMR is a LIVE vaccine — contraindicated in pregnancy due to risk to the fetus. Tdap is recommended during each pregnancy (27–36 weeks). Inactivated influenza and Hep B are safe in pregnancy.",
        },
        {
          id: 47,
          topic: "Respiratory",
          type: "Single",
          stem: "Which position improves oxygenation for a client in respiratory distress?",
          options: [
            { letter: "A", text: "Supine", correct: false },
            { letter: "B", text: "Trendelenburg", correct: false },
            { letter: "C", text: "High Fowler's", correct: true },
            { letter: "D", text: "Prone", correct: false },
          ],
          rationale:
            "High Fowler's (60–90°) allows maximum lung expansion by lowering the diaphragm. This is the go-to position for respiratory distress, pulmonary edema, and dyspnea. Prone is used for ARDS in ICU.",
        },
        {
          id: 48,
          topic: "Cardiac",
          type: "Bow-Tie",
          stem: "Bow-Tie: Heart Failure — Identify the correct management linkage.",
          bowtie: {
            causes: [
              "Myocardial damage",
              "Valve disease",
              "Chronic hypertension",
            ],
            actions: [
              "Administer diuretics",
              "Monitor daily weight",
              "Restrict sodium",
            ],
            outcomes: ["Reduced edema", "Improved breathing"],
          },
          options: [
            {
              letter: "A",
              text: "Diuretics + Daily weight + Na⁺ restriction → Reduced edema = Correct",
              correct: true,
            },
            {
              letter: "B",
              text: "Encourage high-sodium diet for energy",
              correct: false,
            },
            {
              letter: "C",
              text: "Restrict fluids to 500 mL/day only",
              correct: false,
            },
            {
              letter: "D",
              text: "Diuretics are contraindicated in HF",
              correct: false,
            },
          ],
          rationale:
            "HF management: Diuretics (furosemide) to reduce fluid overload, daily weights (same time, same scale — 1 kg = 1 L fluid), sodium restriction (< 2g/day), fluid restriction per provider, and monitoring I&O.",
        },
        {
          id: 49,
          topic: "Ethics/Legal",
          type: "Single",
          stem: "Which situation requires mandatory reporting by the nurse?",
          options: [
            { letter: "A", text: "Elder abuse", correct: true },
            { letter: "B", text: "Adult refusing care", correct: false },
            { letter: "C", text: "Client leaving AMA", correct: false },
            { letter: "D", text: "Medication refusal", correct: false },
          ],
          rationale:
            "Mandatory reporting: Child/elder/vulnerable adult abuse, gunshot wounds, certain communicable diseases, and impaired healthcare workers. Competent adults CAN refuse care, leave AMA, and refuse meds.",
        },
        {
          id: 50,
          topic: "Electrolytes",
          type: "SATA",
          stem: "Which findings indicate hypocalcemia? (Select all that apply.)",
          options: [
            { letter: "A", text: "Trousseau sign", correct: true },
            { letter: "B", text: "Chvostek sign", correct: true },
            { letter: "C", text: "Muscle twitching", correct: true },
            { letter: "D", text: "Decreased reflexes", correct: false },
          ],
          rationale:
            "Hypocalcemia = neuromuscular EXCITABILITY. Trousseau sign (carpal spasm with BP cuff), Chvostek sign (facial twitch when tapping CN VII), muscle twitching/tetany, and hyperreflexia (not decreased). Normal Ca²⁺: 9.0–10.5 mg/dL.",
        },
        {
          id: 51,
          topic: "Med-Surg",
          type: "Priority",
          stem: "A postoperative client reports calf pain and warmth. What is the nurse's priority action?",
          options: [
            { letter: "A", text: "Massage the calf", correct: false },
            { letter: "B", text: "Apply heat", correct: false },
            { letter: "C", text: "Notify the provider", correct: true },
            { letter: "D", text: "Encourage ambulation", correct: false },
          ],
          rationale:
            "Suspected DVT — NEVER massage (risk of embolism). Notify provider immediately for diagnostic workup (D-dimer, ultrasound). Bed rest until ruled out. Heat and ambulation are contraindicated until evaluated.",
        },
        {
          id: 52,
          topic: "Cardiac",
          type: "SATA",
          stem: "Which findings indicate worsening heart failure? (Select all that apply.)",
          options: [
            { letter: "A", text: "Weight gain 2 kg in 2 days", correct: true },
            { letter: "B", text: "Crackles in lungs", correct: true },
            { letter: "C", text: "Decreased BNP", correct: false },
            { letter: "D", text: "Dyspnea on exertion", correct: true },
            { letter: "E", text: "Increased urine output", correct: false },
          ],
          rationale:
            "Worsening HF: Weight gain (1 kg = 1 L fluid retention), crackles (pulmonary congestion), dyspnea. BNP INCREASES with worsening HF (not decreases). Increased urine output indicates improving status.",
        },
        {
          id: 53,
          topic: "Pharmacology",
          type: "Priority",
          stem: "Which medication should be held if the apical pulse is 52/min?",
          options: [
            { letter: "A", text: "Digoxin", correct: true },
            { letter: "B", text: "Furosemide", correct: false },
            { letter: "C", text: "Acetaminophen", correct: false },
            { letter: "D", text: "Cefazolin", correct: false },
          ],
          rationale:
            "Digoxin is held if HR < 60 bpm in adults (< 70 in children, < 90 in infants). Check apical pulse for full 60 seconds before administration. Also check potassium — hypokalemia increases digoxin toxicity.",
        },
        {
          id: 54,
          topic: "Med-Surg",
          type: "Bow-Tie",
          stem: "Bow-Tie: Hypovolemia — Identify the correct linkage.",
          bowtie: {
            causes: [
              "Excessive bleeding",
              "Dehydration",
              "Burns",
              "Vomiting/diarrhea",
            ],
            actions: [
              "Administer IV isotonic fluids (0.9% NS or LR)",
              "Monitor vital signs frequently",
            ],
            outcomes: ["Stabilized BP", "Improved urine output (≥ 30 mL/hr)"],
          },
          options: [
            {
              letter: "A",
              text: "IV isotonic fluids + Monitor VS → Stabilized BP & UOP = Correct",
              correct: true,
            },
            {
              letter: "B",
              text: "Administer D5W for volume replacement",
              correct: false,
            },
            {
              letter: "C",
              text: "Restrict fluids to prevent overload",
              correct: false,
            },
            {
              letter: "D",
              text: "Position in Trendelenburg permanently",
              correct: false,
            },
          ],
          rationale:
            "Hypovolemia treatment: ISOTONIC crystalloids (0.9% NS or Lactated Ringer's). D5W is hypotonic once metabolized — not for volume resuscitation. Monitor MAP > 65, UOP ≥ 30 mL/hr, and mental status.",
        },
        {
          id: 55,
          topic: "Infection Control",
          type: "Single",
          stem: "Which client requires droplet precautions?",
          options: [
            { letter: "A", text: "Tuberculosis", correct: false },
            { letter: "B", text: "Clostridioides difficile", correct: false },
            { letter: "C", text: "Influenza", correct: true },
            { letter: "D", text: "Varicella", correct: false },
          ],
          rationale:
            "Droplet precautions (surgical mask within 3 feet): Influenza, pertussis, meningitis, mumps, rubella, strep pharyngitis. TB/varicella = Airborne (N95). C. diff = Contact (soap & water).",
        },
        {
          id: 56,
          topic: "Safety",
          type: "SATA",
          stem: "Which actions prevent medication errors? (Select all that apply.)",
          options: [
            { letter: "A", text: "Use two patient identifiers", correct: true },
            { letter: "B", text: "Read labels three times", correct: true },
            {
              letter: "C",
              text: "Crush extended-release tablets",
              correct: false,
            },
            { letter: "D", text: "Clarify unclear orders", correct: true },
            {
              letter: "E",
              text: "Document before administration",
              correct: false,
            },
          ],
          rationale:
            "NEVER crush ER/enteric-coated meds (causes dose dumping). NEVER document before giving. The 'Three Checks': Read label when removing, when preparing, and when replacing. Use 2 identifiers (name + DOB).",
        },
        {
          id: 57,
          topic: "Neurological",
          type: "Priority",
          stem: "A client with a head injury becomes restless and confused. What is the priority action?",
          options: [
            { letter: "A", text: "Reorient the client", correct: false },
            { letter: "B", text: "Assess oxygen saturation", correct: true },
            { letter: "C", text: "Apply restraints", correct: false },
            { letter: "D", text: "Administer sedative", correct: false },
          ],
          rationale:
            "Restlessness and confusion in a head injury client may indicate hypoxia or increasing ICP — both life-threatening. ASSESS first (O₂ sat, neuro status). Sedatives can mask neuro changes and are contraindicated.",
        },
        {
          id: 58,
          topic: "Delegation",
          type: "Matrix",
          stem: "Match each task to the appropriate healthcare team member.",
          matrix: {
            headers: ["Task", "RN", "LPN", "AP"],
            rows: [
              ["Initial assessment", "✓", "", ""],
              ["Oral medications", "✓", "✓", ""],
              ["Vital signs (stable client)", "✓", "✓", "✓"],
            ],
          },
          options: [

      function filterByTopic(topic) {
        document
          .querySelectorAll(".topic-chip")
          .forEach((c) => c.classList.remove("active"));
        document
          .querySelector(`.topic-chip[data-topic="${topic}"]`)
          .classList.add("active");
        document.querySelectorAll(".q-card").forEach((card) => {
          card.classList.toggle(
            "hidden",
            topic !== "all" && card.dataset.topic !== topic,
          );
        });
      }

      function setMode(m) {
        mode = m;
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(`.mode-btn[onclick="setMode('${m}')"]`)
          ?.classList.add("active");
        if (m === "missed") {
          document.querySelectorAll(".q-card").forEach((card) => {
            const a = answered[parseInt(card.dataset.qid)];
            card.classList.toggle("hidden", !a || a.correct);
          });
        } else {
          renderQuestions();
        }
      }

      function renderQuestions() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        questions.forEach((q) => {
          const card = document.createElement("div");
          card.className = "q-card";
          card.dataset.qid = q.id;
          card.dataset.topic = q.topic;
          const a = answered[q.id];
          if (a)
            card.classList.add(
              a.correct ? "answered-correct" : "answered-incorrect",
            );

          let html = `<div class="q-number">Question ${q.id} <span class="q-type">${q.type}</span></div>
      <div class="q-stem">${q.stem}</div>`;

          if (q.trendData) {
            html += `<table class="data-table"><tr><th>Time</th><th>Value</th><th>Trend</th></tr>`;
            q.trendData.forEach((d, i) => {
              let arrow = "—",
                cls = "";
              if (i > 0) {
                const cur = parseFloat(d.value),
                  prev = parseFloat(q.trendData[i - 1].value);
                arrow = cur > prev ? "↑" : "↓";
                cls = cur > prev ? "trend-arrow up" : "trend-arrow down";
              }
              html += `<tr><td>${d.time}</td><td>${d.value}</td><td class="${cls}">${arrow}</td></tr>`;
            });
            html += `</table>`;
          }
          if (q.bowtie) {
            html += `<div class="bowtie">
        <div class="bowtie-col"><h4>🔍 Causes / Risk Factors</h4><ul>${q.bowtie.causes.map((c) => `<li>${c}</li>`).join("")}</ul></div>
        <div class="bowtie-col"><h4>⚡ Actions</h4><ul>${q.bowtie.actions.map((a) => `<li>${a}</li>`).join("")}</ul></div>
        <div class="bowtie-col"><h4>✅ Expected Outcomes</h4><ul>${q.bowtie.outcomes.map((o) => `<li>${o}</li>`).join("")}</ul></div>
      </div>`;
          }
          if (q.matrix) {
            html += `<table class="matrix-table"><tr>${q.matrix.headers.map((h) => `<th>${h}</th>`).join("")}</tr>`;
            q.matrix.rows.forEach((row) => {
              html += `<tr>${row.map((cell) => `<td>${cell === "✓" ? '<span class="check">✓</span>' : cell}</td>`).join("")}</tr>`;
            });
            html += `</table>`;
          }

          const isSATA = q.type === "SATA";
          html += `<div class="options" data-qid="${q.id}" data-sata="${isSATA}">`;
          q.options.forEach((opt) => {
            let cls = "option";
            if (a) {
              cls += " disabled";
              if (opt.correct) cls += " correct";
              if (a.selected.includes(opt.letter) && !opt.correct)
                cls += " incorrect-selected";
            }
            if (isSATA) {
              html += `<div class="${cls}" data-letter="${opt.letter}" onclick="toggleSATA(this,${q.id})">
          <span class="checkbox-indicator">${a && a.selected.includes(opt.letter) ? "✓" : ""}</span>
          <span>${opt.letter}. ${opt.text}</span></div>`;
            } else {
              html += `<div class="${cls}" data-letter="${opt.letter}" onclick="selectOption(this,${q.id})">
          <span class="letter">${opt.letter}</span><span>${opt.text}</span></div>`;
            }
          });
          html += `</div>`;

          if (!a)
            html += `<button class="btn btn-primary" id="submit-${q.id}" onclick="submitAnswer(${q.id})" disabled>Submit Answer</button>`;

          if (a || mode === "review") {
            const rCls =
              !a || a.correct ? "correct-rationale" : "incorrect-rationale";
            html += `<div class="rationale ${rCls} ${a || mode === "review" ? "show" : ""}">
        <strong>${a ? (a.correct ? "✅ Correct!" : "❌ Incorrect") : "📖 Rationale:"}</strong>
        ${
          a && !a.correct
            ? `<em>Correct answer: ${q.options
                .filter((o) => o.correct)
                .map((o) => o.letter)
                .join(", ")}</em><br>`
            : ""
        }
        ${q.rationale}</div>`;
          }
          card.innerHTML = html;
          container.appendChild(card);
        });
      }

      function selectOption(el, qid) {
        if (answered[qid]) return;
        el.closest(".options")
          .querySelectorAll(".option")
          .forEach((o) => o.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById(`submit-${qid}`).disabled = false;
      }

      function toggleSATA(el, qid) {
        if (answered[qid]) return;
        el.classList.toggle("selected");
        document.getElementById(`submit-${qid}`).disabled = !el
          .closest(".options")
          .querySelector(".option.selected");
      }

      function submitAnswer(qid) {
        const q = questions.find((x) => x.id === qid);
        const sel = [
          ...document.querySelectorAll(
            `.options[data-qid="${qid}"] .option.selected`,
          ),
        ].map((o) => o.dataset.letter);
        const correct = q.options.filter((o) => o.correct).map((o) => o.letter);
        const isCorrect =
          sel.length === correct.length &&
          sel.every((s) => correct.includes(s));
        answered[qid] = { selected: sel, correct: isCorrect };
        renderQuestions();
        updateStats();
        filterByTopic(
          document.querySelector(".topic-chip.active").dataset.topic,
        );
        if (Object.keys(answered).length === TOTAL) showResults();
      }

      function updateStats() {
        const total = Object.keys(answered).length;
        const correct = Object.values(answered).filter((a) => a.correct).length;
        const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
        document.getElementById("correctCount").textContent = correct;
        document.getElementById("incorrectCount").textContent = total - correct;
        document.getElementById("scorePercent").textContent = pct + "%";
        document.getElementById("answeredCount").textContent = total;
        document.getElementById("progressBar").style.width =
          Math.round((total / TOTAL) * 100) + "%";
      }

      function showResults() {
        const total = Object.keys(answered).length;
        const correct = Object.values(answered).filter((a) => a.correct).length;
        const pct = Math.round((correct / total) * 100);
        document.getElementById("resultsPanel").classList.remove("hidden");
        document.getElementById("scoreCircle").className =
          "score-circle " + (pct >= 70 ? "pass" : "fail");
        document.getElementById("finalScore").textContent = pct + "%";
        document.getElementById("resultMessage").textContent =
          pct >= 90
            ? "🌟 Outstanding! You're mastering this content!"
            : pct >= 70
              ? "✅ Good work! Review missed items for reinforcement."
              : pct >= 50
                ? "⚠️ Keep studying — focus on rationales for missed questions."
                : "📚 Significant review needed. Re-read rationales and retry.";
      }

      function resetAll() {
        answered = {};
        mode = "quiz";
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(".mode-btn[onclick=\"setMode('quiz')\"]")
          .classList.add("active");
        document.getElementById("resultsPanel").classList.add("hidden");
        renderQuestions();
        updateStats();
        filterByTopic("all");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      init();
    </script>
  </body>
</html>
