<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATI Comprehensive Predictor Study Guide 2026 — Part 1 of 4</title>
    <style>
      :root {
        --primary: #0077b6;
        --primary-dark: #005f8a;
        --accent: #00b4d8;
        --success: #2d6a4f;
        --success-bg: #d8f3dc;
        --danger: #d00000;
        --danger-bg: #fde8e8;
        --warning: #e85d04;
        --warning-bg: #fff3cd;
        --bg: #f0f4f8;
        --card: #ffffff;
        --text: #1d3557;
        --text-light: #457b9d;
        --border: #dee2e6;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      .top-bar {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #fff;
        padding: 18px 24px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      .top-bar h1 {
        font-size: 1.3rem;
        font-weight: 700;
      }
      .top-bar .subtitle {
        font-size: 0.85rem;
        opacity: 0.85;
        margin-top: 2px;
      }
      .progress-wrap {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        height: 8px;
        margin-top: 10px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--accent);
        border-radius: 10px;
        transition: width 0.4s ease;
        width: 0%;
      }
      .stats-row {
        display: flex;
        gap: 16px;
        margin-top: 8px;
        font-size: 0.8rem;
      }
      .stats-row span {
        opacity: 0.9;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 20px 16px 80px;
      }
      /* Navigation tabs */
      .nav-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
        padding: 12px 0;
        border-bottom: 2px solid var(--border);
      }
      .nav-tab {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        border: 2px solid var(--border);
        background: #fff;
        color: var(--text-light);
        transition: all 0.2s;
      }
      .nav-tab:hover,
      .nav-tab.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .nav-tab.completed {
        background: var(--success-bg);
        border-color: var(--success);
        color: var(--success);
      }
      .nav-tab.incorrect {
        background: var(--danger-bg);
        border-color: var(--danger);
        color: var(--danger);
      }
      /* Section headers */
      .section-header {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #fff;
        padding: 16px 20px;
        border-radius: 12px;
        margin: 24px 0 16px;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .section-header .tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.25);
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 0.75rem;
        margin-left: 8px;
        font-weight: 500;
      }
      /* Question cards */
      .q-card {
        background: var(--card);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
        border-left: 4px solid var(--primary);
        transition: border-color 0.3s;
      }
      .q-card.answered-correct {
        border-left-color: var(--success);
      }
      .q-card.answered-incorrect {
        border-left-color: var(--danger);
      }
      .q-number {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .q-type {
        display: inline-block;
        background: var(--warning-bg);
        color: var(--warning);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 8px;
      }
      .q-stem {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 10px 0 16px;
        line-height: 1.5;
      }
      /* Options */
      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .option {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        border: 2px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .option:hover:not(.disabled) {
        border-color: var(--primary);
        background: #f0f7ff;
      }
      .option.selected {
        border-color: var(--primary);
        background: #e3f2fd;
      }
      .option.correct {
        border-color: var(--success);
        background: var(--success-bg);
      }
      .option.incorrect-selected {
        border-color: var(--danger);
        background: var(--danger-bg);
      }
      .option.disabled {
        cursor: default;
        opacity: 0.85;
      }
      .option .letter {
        min-width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.8rem;
        background: #e9ecef;
        color: var(--text);
        flex-shrink: 0;
      }
      .option.selected .letter {
        background: var(--primary);
        color: #fff;
      }
      .option.correct .letter {
        background: var(--success);
        color: #fff;
      }
      .option.incorrect-selected .letter {
        background: var(--danger);
        color: #fff;
      }
      .checkbox-indicator {
        min-width: 20px;
        height: 20px;
        border: 2px solid #adb5bd;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .option.selected .checkbox-indicator {
        background: var(--primary);
        border-color: var(--primary);
      }
      .option.correct .checkbox-indicator {
        background: var(--success);
        border-color: var(--success);
      }
      .option.incorrect-selected .checkbox-indicator {
        background: var(--danger);
        border-color: var(--danger);
      }
      /* Submit button */
      .btn {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 12px;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-primary:disabled {
        background: #adb5bd;
        cursor: default;
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
      }
      .btn-outline:hover {
        background: #e3f2fd;
      }
      /* Rationale */
      .rationale {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }
      .rationale.show {
        display: block;
      }
      .rationale.correct-rationale {
        background: var(--success-bg);
        border: 1px solid #b7e4c7;
      }
      .rationale.incorrect-rationale {
        background: var(--danger-bg);
        border: 1px solid #f5c6cb;
      }
      .rationale strong {
        display: block;
        margin-bottom: 4px;
      }
      /* Data tables */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 0.9rem;
      }
      .data-table th,
      .data-table td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .data-table th {
        background: #e9ecef;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .data-table tr:nth-child(even) {
        background: #f8f9fa;
      }
      /* Bow-tie / special sections */
      .bowtie {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        margin: 12px 0;
      }
      .bowtie-col {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .bowtie-col h4 {
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 6px;
        font-weight: 700;
      }
      .bowtie-col ul {
        padding-left: 16px;
        font-size: 0.88rem;
      }
      .bowtie-col li {
        margin-bottom: 4px;
      }
      /* Matrix */
      .matrix-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
      }
      .matrix-table th,
      .matrix-table td {
        padding: 10px;
        border: 1px solid var(--border);
        text-align: center;
      }
      .matrix-table th {
        background: var(--primary);
        color: #fff;
        font-size: 0.8rem;
      }
      .matrix-table td:first-child {
        text-align: left;
        font-weight: 600;
      }
      .matrix-table .check {
        color: var(--success);
        font-size: 1.2rem;
      }
      /* Trend arrow */
      .trend-arrow {
        color: var(--danger);
        font-weight: 700;
      }
      .trend-arrow.up {
        color: var(--danger);
      }
      .trend-arrow.down {
        color: var(--success);
      }
      /* Flashcard mode */
      .mode-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .mode-btn {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        border: 2px solid var(--border);
        background: #fff;
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .hidden {
        display: none !important;
      }
      /* Topic filter */
      .topic-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .topic-chip {
        padding: 4px 12px;
        border-radius: 16px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: #fff;
        transition: all 0.2s;
      }
      .topic-chip.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      /* Results panel */
      .results-panel {
        background: var(--card);
        border-radius: 12px;
        padding: 24px;
        box-shadow: var(--shadow);
        text-align: center;
        margin-top: 20px;
      }
      .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 16px auto;
        font-size: 2rem;
        font-weight: 800;
        border: 6px solid;
      }
      .score-circle.pass {
        border-color: var(--success);
        color: var(--success);
      }
      .score-circle.fail {
        border-color: var(--danger);
        color: var(--danger);
      }
      .score-circle small {
        font-size: 0.7rem;
        font-weight: 500;
      }
      @media (max-width: 600px) {
        .bowtie {
          grid-template-columns: 1fr;
        }
        .container {
          padding: 12px 10px 60px;
        }
        .q-card {
          padding: 16px;
        }
        .top-bar h1 {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <h1>ATI Comprehensive Predictor Study Guide 2026</h1>
      <div class="subtitle">
        Interactive Study Guide — Part 1 of 4 (Questions 1–45)
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="stats-row">
        <span>✅ Correct: <strong id="correctCount">0</strong></span>
        <span>❌ Incorrect: <strong id="incorrectCount">0</strong></span>
        <span>📊 Score: <strong id="scorePercent">0%</strong></span>
        <span>📝 Answered: <strong id="answeredCount">0</strong>/45</span>
      </div>
    </div>

    <div class="container">
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('quiz')">
          📝 Quiz Mode
        </button>
        <button class="mode-btn" onclick="setMode('review')">
          📖 Review Mode
        </button>
        <button class="mode-btn" onclick="setMode('missed')">
          🔴 Missed Only
        </button>
        <button class="mode-btn" onclick="resetAll()">🔄 Reset</button>
      </div>

      <div class="topic-filter" id="topicFilter"></div>

      <div id="questionsContainer"></div>

      <div class="results-panel hidden" id="resultsPanel">
        <h2>Part 1 Complete!</h2>
        <div class="score-circle" id="scoreCircle">
          <span id="finalScore">0%</span>
          <small>Score</small>
        </div>
        <p id="resultMessage"></p>
        <button
          class="btn btn-primary"
          onclick="resetAll()"
          style="margin-top: 16px"
        >
          Retake Quiz
        </button>
        <button
          class="btn btn-outline"
          onclick="setMode('missed')"
          style="margin-top: 16px"
        >
          Review Missed
        </button>
      </div>
    </div>

    <script>
      const questions = [
        {
          id: 1,
          topic: "Ethics/Legal",
          type: "SATA",
          stem: "A competent adult client refuses a blood transfusion for religious reasons. Which actions should the nurse take? (Select all that apply.)",
          options: [
            {
              letter: "A",
              text: "Verify the client understands risks",
              correct: true,
            },
            { letter: "B", text: "Document the refusal", correct: true },
            {
              letter: "C",
              text: "Administer the transfusion if Hgb is critical",
              correct: false,
            },
            { letter: "D", text: "Notify the provider", correct: true },
            {
              letter: "E",
              text: "Ask the family to override the decision",
              correct: false,
            },
          ],
          rationale:
            "Competent adults have autonomy. The nurse ensures informed refusal, documents, and notifies the provider. Administering treatment against a competent adult's wishes violates autonomy, and family cannot override a competent adult's decision.",
        },
        {
          id: 2,
          topic: "Priority/Triage",
          type: "Priority",
          stem: "Which client should the nurse assess first?",
          options: [
            {
              letter: "A",
              text: "Post-op day 2 with pain 6/10",
              correct: false,
            },
            {
              letter: "B",
              text: "COPD client with O₂ sat 88% on room air",
              correct: true,
            },
            {
              letter: "C",
              text: "Client waiting for discharge teaching",
              correct: false,
            },
            {
              letter: "D",
              text: "Stable diabetic requesting a snack",
              correct: false,
            },
          ],
          rationale:
            "Airway and oxygenation take priority (ABC framework). The COPD client with 88% O₂ sat has the most urgent physiological need.",
        },
        {
          id: 3,
          topic: "Med-Surg",
          type: "Bow-Tie",
          stem: "Using the Bow-Tie format, identify the correct linkage for Sepsis.",
          bowtie: {
            causes: ["Infection", "Inflammatory response"],
            actions: [
              "Administer broad-spectrum antibiotics",
              "Obtain blood cultures",
              "Start IV fluids",
            ],
            outcomes: ["Improved BP", "Decreased lactate"],
          },
          options: [
            {
              letter: "A",
              text: "All actions correctly address the condition — Correct linkage",
              correct: true,
            },
            {
              letter: "B",
              text: "Only antibiotics are needed",
              correct: false,
            },
            {
              letter: "C",
              text: "Blood cultures are not necessary",
              correct: false,
            },
            {
              letter: "D",
              text: "IV fluids are contraindicated in sepsis",
              correct: false,
            },
          ],
          rationale:
            "Sepsis management follows the Surviving Sepsis Campaign: obtain cultures BEFORE antibiotics, start broad-spectrum antibiotics within 1 hour, and administer 30 mL/kg crystalloid for hypotension.",
        },
        {
          id: 4,
          topic: "Pharmacology",
          type: "SATA",
          stem: "Which findings indicate digoxin toxicity?",
          options: [
            { letter: "A", text: "Bradycardia", correct: true },
            { letter: "B", text: "Green-yellow halos", correct: true },
            { letter: "C", text: "Hypokalemia", correct: true },
            { letter: "D", text: "Tachycardia", correct: false },
            { letter: "E", text: "Hyperkalemia", correct: false },
          ],
          rationale:
            "Low potassium increases digoxin toxicity. Visual disturbances (green-yellow halos) and bradycardia are classic signs. Therapeutic digoxin level is 0.5–2.0 ng/mL. Hold if HR < 60 bpm.",
        },
        {
          id: 5,
          topic: "Delegation",
          type: "Single",
          stem: "Which task can the RN delegate to an assistive personnel (AP)?",
          options: [
            { letter: "A", text: "Assess pain", correct: false },
            { letter: "B", text: "Reinforce teaching", correct: false },
            {
              letter: "C",
              text: "Obtain vital signs on stable client",
              correct: true,
            },
            { letter: "D", text: "Administer IV antibiotics", correct: false },
          ],
          rationale:
            "APs can perform routine, non-assessment tasks on stable clients. Assessment, teaching, evaluation, and IV medication administration require RN scope.",
        },
        {
          id: 6,
          topic: "Infection Control",
          type: "Matrix",
          stem: "Match each intervention to whether it primarily PREVENTS or TREATS infection.",
          matrix: {
            headers: ["Intervention", "Prevents Infection", "Treats Infection"],
            rows: [
              ["Hand hygiene", "✓", ""],
              ["Antibiotics", "", "✓"],
              ["PPE", "✓", ""],
            ],
          },
          options: [
            {
              letter: "A",
              text: "Hand hygiene → Prevents; Antibiotics → Treats; PPE → Prevents",
              correct: true,
            },
            {
              letter: "B",
              text: "All three prevent infection",
              correct: false,
            },
            { letter: "C", text: "All three treat infection", correct: false },
            {
              letter: "D",
              text: "Hand hygiene → Treats; Antibiotics → Prevents; PPE → Treats",
              correct: false,
            },
          ],
          rationale:
            "Hand hygiene and PPE are PREVENTION measures. Antibiotics are used to TREAT existing infections. Prevention is always the first line of defense.",
        },
        {
          id: 7,
          topic: "Cardiac",
          type: "Priority",
          stem: "A client reports chest pain radiating to the left arm. What is the first action?",
          options: [
            { letter: "A", text: "Obtain ECG", correct: true },
            { letter: "B", text: "Administer morphine", correct: false },
            { letter: "C", text: "Give oxygen", correct: false },
            { letter: "D", text: "Draw troponin", correct: false },
          ],
          rationale:
            "ECG within 10 minutes is priority for suspected MI. This helps confirm the diagnosis and guide treatment (STEMI vs. NSTEMI). Remember: MONA (Morphine, Oxygen, Nitro, Aspirin) but ECG comes first.",
        },
        {
          id: 8,
          topic: "Electrolytes",
          type: "Trend",
          stem: "Review the potassium trend. What is the nurse's priority?",
          trendData: [
            { time: "0800", value: "5.1 mEq/L" },
            { time: "1200", value: "5.6 mEq/L" },
            { time: "1600", value: "6.0 mEq/L" },
          ],
          options: [
            { letter: "A", text: "Document findings", correct: false },
            { letter: "B", text: "Administer loop diuretic", correct: false },
            { letter: "C", text: "Place on cardiac monitor", correct: true },
            { letter: "D", text: "Encourage potassium intake", correct: false },
          ],
          rationale:
            "Rising hyperkalemia (>5.0 mEq/L) risks life-threatening dysrhythmias (peaked T waves, widened QRS, V-fib). Cardiac monitoring is the immediate priority. Normal K⁺: 3.5–5.0 mEq/L.",
        },
        {
          id: 9,
          topic: "Respiratory",
          type: "Single",
          stem: "Which finding indicates impending respiratory failure?",
          options: [
            { letter: "A", text: "RR 18", correct: false },
            { letter: "B", text: "PaCO₂ rising", correct: true },
            { letter: "C", text: "O₂ sat 95%", correct: false },
            { letter: "D", text: "Clear lung sounds", correct: false },
          ],
          rationale:
            "Rising PaCO₂ indicates hypoventilation and CO₂ retention — an ominous sign of impending respiratory failure. Normal PaCO₂: 35–45 mmHg.",
        },
        {
          id: 10,
          topic: "Neurological",
          type: "SATA",
          stem: "Which are expected findings of a left-sided stroke? (Select all that apply.)",
          options: [
            { letter: "A", text: "Aphasia", correct: true },
            { letter: "B", text: "Right-sided weakness", correct: true },
            { letter: "C", text: "Spatial neglect", correct: false },
            { letter: "D", text: "Impulsive behavior", correct: false },
          ],
          rationale:
            "Left brain controls language and the right side of the body. Aphasia and right-sided weakness are left-stroke findings. Spatial neglect and impulsivity are RIGHT-sided stroke findings.",
        },
        {
          id: 11,
          topic: "Renal",
          type: "Single",
          stem: "Which lab requires immediate follow-up?",
          options: [
            { letter: "A", text: "Creatinine 2.1", correct: true },
            { letter: "B", text: "BUN 18", correct: false },
            { letter: "C", text: "Sodium 138", correct: false },
            { letter: "D", text: "Calcium 9.2", correct: false },
          ],
          rationale:
            "Elevated creatinine (normal: 0.6–1.2 mg/dL) indicates impaired kidney function. BUN 18 (normal: 10–20), Na⁺ 138 (normal: 136–145), and Ca²⁺ 9.2 (normal: 9.0–10.5) are all within normal limits.",
        },
        {
          id: 12,
          topic: "Endocrine",
          type: "Bow-Tie",
          stem: "Using the Bow-Tie format for Hypoglycemia: Identify the correct management.",
          bowtie: {
            causes: ["Too much insulin", "Skipped meal", "Excessive exercise"],
            actions: [
              "Administer 15 g fast-acting carb",
              "Recheck glucose in 15 min",
              "Follow with protein",
            ],
            outcomes: ["Glucose > 70 mg/dL"],
          },
          options: [
            {
              letter: "A",
              text: "Give 15g carb → Recheck in 15 min → Follow with protein → Correct",
              correct: true,
            },
            {
              letter: "B",
              text: "Administer insulin immediately",
              correct: false,
            },
            {
              letter: "C",

      function buildTopicFilter() {
        const container = document.getElementById("topicFilter");
        const allChip = document.createElement("span");
        allChip.className = "topic-chip active";
        allChip.textContent = "All Topics";
        allChip.dataset.topic = "all";
        allChip.onclick = () => filterByTopic("all");
        container.appendChild(allChip);

        topics.forEach((t) => {
          const chip = document.createElement("span");
          chip.className = "topic-chip";
          chip.textContent = t;
          chip.dataset.topic = t;
          chip.onclick = () => filterByTopic(t);
          container.appendChild(chip);
        });
      }

      function filterByTopic(topic) {
        document
          .querySelectorAll(".topic-chip")
          .forEach((c) => c.classList.remove("active"));

          .querySelector(`.topic-chip[data-topic="${topic}"]`)
          .classList.add("active");

        document.querySelectorAll(".q-card").forEach((card) => {
          if (topic === "all") {
            card.classList.remove("hidden");
          } else {
            card.classList.toggle("hidden", card.dataset.topic !== topic);
          }
        });
      }

      function setMode(m) {
        mode = m;
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(`.mode-btn[onclick="setMode('${m}')"]`)
          ?.classList.add("active");

        if (m === "missed") {
          document.querySelectorAll(".q-card").forEach((card) => {
            const qid = parseInt(card.dataset.qid);
            const a = answered[qid];
            card.classList.toggle("hidden", !a || a.correct);
          });
        } else {
          renderQuestions();
        }
      }

      function renderQuestions() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";

        let currentTopic = "";
        questions.forEach((q) => {
          if (q.topic !== currentTopic) {
            currentTopic = q.topic;
          }

          const card = document.createElement("div");
          card.className = "q-card";
          card.dataset.qid = q.id;
          card.dataset.topic = q.topic;

          const a = answered[q.id];
          if (a) {
            card.classList.add(
              a.correct ? "answered-correct" : "answered-incorrect",
            );
          }

          let html = `
      <div class="q-number">Question ${q.id} <span class="q-type">${q.type}</span></div>
      <div class="q-stem">${q.stem}</div>
    `;

          // Trend data table
          if (q.trendData) {
            html += `<table class="data-table"><tr><th>Time</th><th>Value</th><th>Trend</th></tr>`;
            q.trendData.forEach((d, i) => {
              const arrow =
                i > 0
                  ? parseFloat(d.value) > parseFloat(q.trendData[i - 1].value)
                    ? "↑"
                    : "↓"
                  : "—";
              const cls =
                arrow === "↑"
                  ? "trend-arrow up"
                  : arrow === "↓"
                    ? "trend-arrow down"
                    : "";
              html += `<tr><td>${d.time}</td><td>${d.value}</td><td class="${cls}">${arrow}</td></tr>`;
            });
            html += `</table>`;
          }

          // Bow-tie visual
          if (q.bowtie) {
            html += `<div class="bowtie">
        <div class="bowtie-col"><h4>🔍 Causes/Risk Factors</h4><ul>${q.bowtie.causes.map((c) => `<li>${c}</li>`).join("")}</ul></div>
        <div class="bowtie-col"><h4>⚡ Actions</h4><ul>${q.bowtie.actions.map((a) => `<li>${a}</li>`).join("")}</ul></div>
        <div class="bowtie-col"><h4>✅ Expected Outcomes</h4><ul>${q.bowtie.outcomes.map((o) => `<li>${o}</li>`).join("")}</ul></div>
      </div>`;
          }

          // Matrix visual
          if (q.matrix) {
            html += `<table class="matrix-table"><tr>${q.matrix.headers.map((h) => `<th>${h}</th>`).join("")}</tr>`;
            q.matrix.rows.forEach((row) => {
              html += `<tr>${row.map((cell, i) => `<td>${cell === "✓" ? '<span class="check">✓</span>' : cell}</td>`).join("")}</tr>`;
            });
            html += `</table>`;
          }

          // Options
          const isSATA = q.type === "SATA";
          html += `<div class="options" data-qid="${q.id}" data-sata="${isSATA}">`;
          q.options.forEach((opt) => {
            const isAnswered = !!a;
            let cls = "option";
            if (isAnswered) {
              cls += " disabled";
              if (opt.correct) cls += " correct";
              if (a.selected.includes(opt.letter) && !opt.correct)
                cls += " incorrect-selected";
              if (a.selected.includes(opt.letter) && opt.correct)
                cls += " correct";
            }

            if (isSATA) {
              html += `<div class="${cls}" data-letter="${opt.letter}" onclick="toggleSATA(this, ${q.id})">
          <span class="checkbox-indicator">${(isAnswered && a.selected.includes(opt.letter)) || false ? "✓" : ""}</span>
          <span>${opt.letter}. ${opt.text}</span>
        </div>`;
            } else {
              html += `<div class="${cls}" data-letter="${opt.letter}" onclick="selectOption(this, ${q.id})">
          <span class="letter">${opt.letter}</span>
          <span>${opt.text}</span>
        </div>`;
            }
          });
          html += `</div>`;

          if (!a) {
            html += `<button class="btn btn-primary" id="submit-${q.id}" onclick="submitAnswer(${q.id})" disabled>Submit Answer</button>`;
          }

          // Rationale
          if (a || mode === "review") {
            const rClass =
              !a || a.correct ? "correct-rationale" : "incorrect-rationale";
            html += `<div class="rationale ${rClass} ${a || mode === "review" ? "show" : ""}">
        <strong>${a ? (a.correct ? "✅ Correct!" : "❌ Incorrect") : "📖 Rationale:"}</strong>
        ${
          a && !a.correct
            ? `<em>Correct answer: ${q.options
                .filter((o) => o.correct)
                .map((o) => o.letter)
                .join(", ")}</em><br>`
            : ""
        }
        ${q.rationale}
      </div>`;
          }

          card.innerHTML = html;
          container.appendChild(card);
        });
      }

      function selectOption(el, qid) {
        if (answered[qid]) return;
        const container = el.closest(".options");
        container
          .querySelectorAll(".option")
          .forEach((o) => o.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById(`submit-${qid}`).disabled = false;
      }

      function toggleSATA(el, qid) {
        if (answered[qid]) return;
        el.classList.toggle("selected");
        const container = el.closest(".options");
        const anySelected = container.querySelector(".option.selected");
        document.getElementById(`submit-${qid}`).disabled = !anySelected;
      }

      function submitAnswer(qid) {
        const q = questions.find((x) => x.id === qid);
        const container = document.querySelector(`.options[data-qid="${qid}"]`);
        const selected = [
          ...container.querySelectorAll(".option.selected"),
        ].map((o) => o.dataset.letter);

        const correctLetters = q.options
          .filter((o) => o.correct)
          .map((o) => o.letter);
        const isCorrect =
          selected.length === correctLetters.length &&
          selected.every((s) => correctLetters.includes(s));

        answered[qid] = { selected, correct: isCorrect };
        renderQuestions();
        updateStats();
        filterByTopic(
          document.querySelector(".topic-chip.active").dataset.topic,
        );

        // Check completion
        if (Object.keys(answered).length === questions.length) {
          showResults();
        }
      }

      function updateStats() {
        const total = Object.keys(answered).length;
        const correct = Object.values(answered).filter((a) => a.correct).length;
        const incorrect = total - correct;
        const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

        document.getElementById("correctCount").textContent = correct;
        document.getElementById("incorrectCount").textContent = incorrect;
        document.getElementById("scorePercent").textContent = pct + "%";
        document.getElementById("answeredCount").textContent = total;
        document.getElementById("progressBar").style.width =
          Math.round((total / questions.length) * 100) + "%";
      }

      function showResults() {
        const total = Object.keys(answered).length;
        const correct = Object.values(answered).filter((a) => a.correct).length;
        const pct = Math.round((correct / total) * 100);

        const panel = document.getElementById("resultsPanel");
        panel.classList.remove("hidden");

        const circle = document.getElementById("scoreCircle");
        circle.className = "score-circle " + (pct >= 70 ? "pass" : "fail");
        document.getElementById("finalScore").textContent = pct + "%";

        const msg =
          pct >= 90
            ? "🌟 Outstanding! You're NCLEX-ready!"
            : pct >= 70
              ? "✅ Good work! Keep strengthening weak areas."
              : pct >= 50
                ? "⚠️ Review the missed topics carefully."
                : "📚 Significant review needed. Focus on rationales.";
        document.getElementById("resultMessage").textContent = msg;
      }

      function resetAll() {
        answered = {};
        mode = "quiz";
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(".mode-btn[onclick=\"setMode('quiz')\"]")
          .classList.add("active");
        document.getElementById("resultsPanel").classList.add("hidden");
        renderQuestions();
        updateStats();
        filterByTopic("all");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      init();
    </script>

      "
    >

          font-weight: 800;
          color: #0077b6;
          letter-spacing: 1px;
          margin-bottom: 4px;

      >
        TehraniLabs
      </div>
